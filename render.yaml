services:
  - type: web
    name: econ-calendar-scraper
    env: node
    plan: starter          # $7/mo — no cold starts, persistent process
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: API_SECRET
        generateValue: true   # Render auto-generates; copy this into Apps Script
    healthCheckPath: /health
